<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Tracker — Lightweight</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="brand">
          <div class="logo">TT</div>
          <div>
            <div class="title">Task Tracker</div>
            <div class="subtitle">Lightweight, privacy-friendly task manager</div>
          </div>
        </div>
      </header>

      <div class="grid">
        <section class="card" id="listCard">
          <h2>Current Tasks</h2>
          <div id="tasksContainer"></div>
        </section>

        <aside class="card">
          <h2>Backend Connection</h2>
          <form id="backendForm" class="form-grid" style="margin-bottom:1rem">
            <label>Backend URL
              <input id="backendUrl" type="url" placeholder="https://your-backend.onrender.com" />
            </label>
            <div class="controls">
              <button type="submit">Save Backend URL</button>
            </div>
            <div class="muted" id="backendMode">Mode: Local only</div>
          </form>

          <h2>Add a Task</h2>
          <form id="taskForm" class="form-grid">
            <label>Title<input required name="title" maxlength="120" /></label>
            <label>Description<textarea name="description" rows="3" maxlength="500"></textarea></label>
            <label>Due date<input type="date" name="dueDate" /></label>
            <label>Alert email<input type="email" name="recipientEmail" placeholder="name@example.com" /></label>
            <div class="controls">
              <button type="submit">Create Task</button>
              <button type="button" class="btn-ghost" id="clearBtn">Clear All</button>
            </div>
          </form>
        </aside>
      </div>
    </main>

    <script>
      const STORAGE_KEY = 'task-tracker.tasks.v1';
      const API_URL_KEY = 'task-tracker.api-base-url.v1';

      function normalizeBaseUrl(value=''){
        return String(value || '').trim().replace(/\/$/, '');
      }

      function getApiBaseUrl(){
        return normalizeBaseUrl(localStorage.getItem(API_URL_KEY) || '');
      }

      function setBackendModeLabel(){
        const modeEl = document.getElementById('backendMode');
        const baseUrl = getApiBaseUrl();
        modeEl.textContent = baseUrl ? `Mode: Connected to ${baseUrl}` : 'Mode: Local only';
      }

      async function fetchJson(url, options){
        const response = await fetch(url, options);
        if(!response.ok){
          let message = 'Request failed';
          try{
            const errorBody = await response.json();
            message = errorBody.message || message;
          }catch(_error){}
          throw new Error(message);
        }

        return response.json();
      }

      function loadTasks(){
        try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') }catch(e){return[]}
      }
      function saveTasks(tasks){ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)) }

      async function loadTasksFromBackend(){
        const baseUrl = getApiBaseUrl();
        if(!baseUrl){
          return loadTasks();
        }

        return fetchJson(`${baseUrl}/api/tasks`);
      }

      async function createTaskInBackend(data){
        const baseUrl = getApiBaseUrl();
        if(!baseUrl){
          const tasks = loadTasks();
          tasks.unshift(data);
          saveTasks(tasks);
          return;
        }

        await fetchJson(`${baseUrl}/api/tasks`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(data)
        });
      }

      async function render(){
        const container = document.getElementById('tasksContainer');
        let tasks = [];

        try{
          tasks = await loadTasksFromBackend();
        }catch(error){
          container.innerHTML = `<div class="empty">Could not load backend tasks: ${escape(error.message)}</div>`;
          return;
        }

        if(!tasks.length){ container.innerHTML = '<div class="empty">No tasks yet — add one on the right.</div>'; return }

        const rows = tasks.map((t, i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,0.03)">
            <div>
              <div style="font-weight:700">${escape(t.title)}</div>
              <div class="muted">${escape(t.description||'—')}</div>
              <div class="muted">Due: ${escape(t.dueDate||'—')} • ${escape(t.recipientEmail||'—')}</div>
            </div>
            <div style="display:flex;gap:.5rem">
              <button class="btn-ghost" data-index="${i}">Delete</button>
            </div>
          </div>`).join('');

        container.innerHTML = rows;
        container.querySelectorAll('button[data-index]').forEach(btn => btn.addEventListener('click', (e)=>{
          if(getApiBaseUrl()){
            alert('Delete is only available in local mode right now.');
            return;
          }
          const idx = Number(e.currentTarget.dataset.index);
          const t = loadTasks(); t.splice(idx,1); saveTasks(t); render();
        }));
      }

      function escape(s=''){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;") }

      document.getElementById('backendForm').addEventListener('submit', (e)=>{
        e.preventDefault();
        const input = document.getElementById('backendUrl');
        const value = normalizeBaseUrl(input.value);
        if(value){
          localStorage.setItem(API_URL_KEY, value);
        }else{
          localStorage.removeItem(API_URL_KEY);
        }
        setBackendModeLabel();
        render();
      });

      document.getElementById('taskForm').addEventListener('submit', e=>{
        e.preventDefault();
        const f = e.currentTarget;
        const data = { title: f.title.value.trim(), description: f.description.value.trim(), dueDate: f.dueDate.value, recipientEmail: f.recipientEmail.value.trim() };
        if(!data.title){ alert('Title is required'); return }

        createTaskInBackend(data)
          .then(()=>{
            f.reset();
            render();
          })
          .catch((error)=>{
            alert(`Could not create task: ${error.message}`);
          });
      });

      document.getElementById('clearBtn').addEventListener('click', ()=>{
        if(getApiBaseUrl()){
          alert('Clear all is only available in local mode right now.');
          return;
        }

        if(confirm('Clear all tasks?')){
          localStorage.removeItem(STORAGE_KEY);
          render();
        }
      });

      document.getElementById('backendUrl').value = getApiBaseUrl();
      setBackendModeLabel();
      render();
    </script>
  </body>
</html>
