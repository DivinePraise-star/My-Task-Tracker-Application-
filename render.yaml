services:
  - type: web
    name: my-task-tracker-backend
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /var/data
      - key: REMINDER_DAYS_AHEAD
        value: "1"
      - key: REMINDER_INTERVAL_MINUTES
        value: "15"
      - key: ALERT_SENDER_EMAIL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: task-tracker-data
      mountPath: /var/data
      sizeGB: 1
